name: 'Ultraclaw Multi-Platform CI/CD'

on:
  push:
    branches:
      - main
  release:
    types: [created]

jobs:
  build-rust-tui:
    name: Build Terminal UI (Rust)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build TUI Binary
        run: cargo build --release
      - name: Upload TUI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ultraclaw-tui-${{ matrix.os }}
          path: target/release/ultraclaw*

  build-tauri-desktop:
    name: Build Desktop App (Tauri)
    needs: build-rust-tui
    runs-on: ${{ matrix.settings.os }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - os: macos-13
            label: macos
          - os: ubuntu-20.04
            label: linux
          - os: windows-latest
            label: windows
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies (Ubuntu only)
        if: matrix.settings.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install frontend dependencies
        working-directory: ui
        run: npm install
      - name: Build Tauri App
        working-directory: ui
        run: npx tauri build
      - name: Upload macOS Artifacts (DMG)
        if: matrix.settings.label == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: ultraclaw-macos-dmg
          path: ui/src-tauri/target/release/bundle/dmg/*.dmg
      - name: Upload Windows Artifacts (EXE/MSI)
        if: matrix.settings.label == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ultraclaw-windows-exe
          path: |
            ui/src-tauri/target/release/bundle/nsis/*.exe
            ui/src-tauri/target/release/bundle/msi/*.msi
      - name: Upload Linux Artifacts (DEB/AppImage)
        if: matrix.settings.label == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ultraclaw-linux-bundles
          path: |
            ui/src-tauri/target/release/bundle/deb/*.deb
            ui/src-tauri/target/release/bundle/appimage/*.AppImage
