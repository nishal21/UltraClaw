name: 'Ultraclaw Multi-Platform CI/CD'

on:
  push:
    branches:
      - main
  release:
    types: [created]

jobs:
  build-rust-tui:
    name: Build Terminal UI (Rust)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      - name: Build TUI Binary
        run: cargo build --release
      - name: Upload TUI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ultraclaw-tui-${{ matrix.os }}
          path: target/release/ultraclaw*

  build-tauri-desktop:
    name: Build Desktop App (Tauri)
    needs: build-rust-tui
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-20.04, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-20.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install frontend dependencies
        run: cd ui && npm install
      - name: Build Tauri Desktop
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: './ui'

  build-android-apk:
    name: Build Android APK (Tauri Mobile)
    needs: build-rust-tui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install frontend dependencies
        run: cd ui && npm install
      - name: Build Android APK
        run: cd ui && npx tauri android build
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ultraclaw-android-apk
          path: ui/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk
